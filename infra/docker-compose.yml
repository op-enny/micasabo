services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ORIGIN: https://${DOMAIN:-localhost}
      BACKEND_URL: http://backend:3001
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "1000:1000"
    environment:
      DB_PATH: /data/micasabo.db
      UPLOAD_DIR: /data/uploads
      PORT: "3001"
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - db_data:/data
      - ../schema.sql:/app/schema.sql:ro

volumes:
  caddy_data:
  caddy_config:
  db_data:
